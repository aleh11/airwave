name: Release Raspberry Pi binary

on:
  push:
    branches:
      - main
    paths:
      - package.json

concurrency:
  group: airwave-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - id: version
        name: Read release version
        shell: bash
        run: |
          version="$(deno eval 'import metadata from "./package.json" with { type: "json" }; console.log(metadata.version)')"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::package.json contains an invalid release version: ${version}"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v${version}" >/dev/null 2>&1; then
            echo "::error::v${version} has already been released. Bump package.json before publishing."
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - run: deno task check
      - run: deno task test
      - run: deno task compile
      - run: cd build && sha256sum airwave-linux-arm64 > airwave-linux-arm64.sha256
      - run: gh release create "v${{ steps.version.outputs.version }}" build/airwave-linux-arm64 build/airwave-linux-arm64.sha256 install.sh uninstall.sh --target "${GITHUB_SHA}" --generate-notes --title "Airwave v${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}
